name: Daily AI Report

on:
  schedule:
    - cron: "30 1 * * *"  # 北京时间 09:30
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5  # 已更新到兼容 Node.js 24 的版本

      - name: Set up Python
        uses: actions/setup-python@v6  # 已更新到兼容 Node.js 24 的版本
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run daily report script
        env:
          QQ_EMAIL: ${{ secrets.MY_QQ }}      # 和你仓库的密钥名对应上了
          QQ_AUTH: ${{ secrets.MY_QQ_AUTH }}  # 和你仓库的密钥名对应上了
        run: python main.py
